<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — NexaCargo</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>

<div id="loading-screen">
  <div class="loading-grid"></div>
  <div class="loading-rings"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="loading-logo">N</div></div>
  <h1 class="loading-title">NexaCargo</h1>
  <p class="loading-subtitle">Worldwide Logistics</p>
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p class="loading-msg" id="loading-msg">Loading...</p>
  <p class="loading-tagline">"Delivering Trust, Worldwide"</p>
</div>

<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">N</div>
      <h1>NexaCargo Worldwide</h1>
      <p>Sign in to track and manage your shipments</p>
    </div>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <div class="alert" id="login-error"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="john@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
        Sign In →
      </button>
    </div>
    <div class="auth-switch">Don't have an account? <a href="register.html">Create one free</a></div>
    <div class="auth-footer">NexaCargo Worldwide © 2026</div>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  Auth.redirectIfLoggedIn();
  initLoadingScreen(['Loading...'], 1400);

  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    document.getElementById('login-error').classList.remove('show');

    if (!email || !password) { showAlert('login-error', 'Please enter your email and password.', 'error'); return; }

    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const data = await api.post('/auth/login', { email, password });
      Auth.save(data.token, data.user);
      btn.textContent = '✅ Redirecting...';
      btn.style.background = 'var(--success)';
      setTimeout(() => location.href = 'dashboard.html', 800);
    } catch(e) {
      showAlert('login-error', e.message || 'Invalid email or password.', 'error');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }
</script>
</body>
</html>
