<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>NexaCargo Admin</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>
<div id="loading-screen">
  <div class="loading-grid"></div>
  <div class="loading-rings">
    <div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div>
    <div class="loading-logo">N</div>
  </div>
  <h1 class="loading-title">NexaCargo</h1>
  <p class="loading-subtitle">Worldwide Admin Panel</p>
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p class="loading-msg" id="loading-msg">Starting up...</p>
  <p class="loading-tagline">"Delivering Trust, Worldwide"</p>
</div>
<script src="assets/app.js"></script>
<script>
  const msgs = ['Starting up...', 'Checking session...', 'Redirecting...'];
  let i = 0;
  const msgEl = document.getElementById('loading-msg');
  const iv = setInterval(() => {
    i++;
    if (i < msgs.length) { msgEl.style.opacity=0; setTimeout(()=>{ msgEl.textContent=msgs[i]; msgEl.style.opacity=1; },150); }
  }, 600);
  setTimeout(() => {
    clearInterval(iv);
    window.location.href = Auth.isLoggedIn() ? 'dashboard.html' : 'login.html';
  }, 2000);
</script>
</body>
</html>
