<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Shipment — NexaCargo Admin</title>
  <link rel="stylesheet" href="assets/styles.css"/>
</head>
<body>

<div id="loading-screen">
  <div class="loading-grid"></div>
  <div class="loading-rings">
    <div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div>
    <div class="loading-logo">N</div>
  </div>
  <h1 class="loading-title">NexaCargo</h1>
  <p class="loading-subtitle">Worldwide Admin Panel</p>
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <p class="loading-msg" id="loading-msg">Loading form...</p>
  <p class="loading-tagline">"Delivering Trust, Worldwide"</p>
</div>

<div class="app-shell" id="app-shell">
  <div class="main-area">
    <div class="page-content">

      <div class="page-header">
        <div>
          <h1 id="page-title">Create New Shipment</h1>
          <p id="page-sub">Fill in details — tracking ID is auto-generated</p>
        </div>
        <button class="btn btn-secondary" onclick="history.back()">← Back</button>
      </div>

      <div class="alert" id="form-alert"></div>

      <form id="shipment-form" style="max-width:820px;" onsubmit="return false;">

        <!-- Sender -->
        <div class="card" style="margin-bottom:18px;">
          <div class="card-header"><span class="card-title">📤 Sender Information</span></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name <span class="req">*</span></label>
                <input type="text" class="form-control" id="sender_name" placeholder="John Doe" required/>
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="sender_phone" placeholder="+234..."/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="sender_email" placeholder="john@email.com"/>
              </div>
              <div class="form-group">
                <label class="form-label">Pickup Address</label>
                <input type="text" class="form-control" id="sender_address" placeholder="123 Street, City, Country"/>
              </div>
            </div>
          </div>
        </div>

        <!-- Receiver -->
        <div class="card" style="margin-bottom:18px;">
          <div class="card-header"><span class="card-title">📥 Receiver Information</span></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name <span class="req">*</span></label>
                <input type="text" class="form-control" id="receiver_name" placeholder="Jane Smith" required/>
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="receiver_phone" placeholder="+1..."/>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="receiver_email" placeholder="jane@email.com"/>
              </div>
              <div class="form-group">
                <label class="form-label">Destination Country <span class="req">*</span></label>
                <input type="text" class="form-control" id="receiver_country" placeholder="United States" required/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Delivery Address <span class="req">*</span></label>
              <input type="text" class="form-control" id="receiver_address" placeholder="456 Avenue, New York, USA" required/>
            </div>
          </div>
        </div>

        <!-- Package -->
        <div class="card" style="margin-bottom:18px;">
          <div class="card-header"><span class="card-title">📦 Package Details</span></div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Package Description</label>
              <textarea class="form-control" id="package_description" placeholder="e.g. iPhone 17, Electronics, Documents, Clothing..."></textarea>
            </div>
            <div class="form-row-3">
              <div class="form-group">
                <label class="form-label">Weight</label>
                <input type="text" class="form-control" id="weight" placeholder="e.g. 2.5kg"/>
              </div>
              <div class="form-group">
                <label class="form-label">Service Type</label>
                <select class="form-control" id="service_type">
                  <option value="delivery">Delivery Only</option>
                  <option value="pickup">Pickup Only</option>
                  <option value="pickup_and_delivery">Pickup & Delivery</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Estimated Delivery</label>
                <input type="date" class="form-control" id="estimated_delivery"/>
              </div>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:12px;justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" onclick="history.back()">Cancel</button>
          <button type="button" class="btn btn-primary" id="submit-btn" onclick="submitShipment()">
            🚀 Create Shipment & Generate Tracking ID
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="assets/app.js"></script>
<script src="assets/layout.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  initLoadingScreen(['Loading form...'], 1600);

  const editId       = getParam('edit');
  const fromRequestId = getParam('from_request');
  const isEdit       = !!editId;

  if (isEdit) {
    document.getElementById('page-title').textContent = 'Edit Shipment';
    document.getElementById('page-sub').textContent   = 'Update shipment details';
    document.getElementById('submit-btn').textContent  = '💾 Update Shipment';
  }
  if (fromRequestId) {
    document.getElementById('page-title').textContent = 'Convert Request to Shipment';
    document.getElementById('page-sub').textContent   = 'Pre-filled from customer request — complete the receiver details';
  }

  async function loadForEdit() {
    // Pre-fill from shipment (edit mode)
    if (isEdit) {
      try {
        const data = await api.get('/admin/shipments/' + editId);
        const s = data.shipment;
        ['sender_name','sender_phone','sender_email','sender_address',
         'receiver_name','receiver_phone','receiver_email','receiver_address',
         'receiver_country','package_description','weight','service_type'].forEach(f => {
          const el = document.getElementById(f);
          if (el && s[f]) el.value = s[f];
        });
        if (s.estimated_delivery)
          document.getElementById('estimated_delivery').value = s.estimated_delivery.split('T')[0];
      } catch(e) { alert('Error loading shipment: ' + e.message); }
      return;
    }

    // Pre-fill from request (convert mode)
    if (fromRequestId) {
      try {
        const stored = sessionStorage.getItem('prefill_request');
        if (stored) {
          const r = JSON.parse(stored);
          const map = {
            sender_name:         r.sender_name,
            sender_phone:        r.sender_phone,
            sender_email:        r.sender_email,
            sender_address:      r.pickup_address,
            receiver_address:    r.delivery_address,
            receiver_country:    r.delivery_country,
            package_description: r.package_description,
            weight:              r.weight,
          };
          Object.entries(map).forEach(([id, val]) => {
            const el = document.getElementById(id);
            if (el && val) el.value = val;
          });
          sessionStorage.removeItem('prefill_request');
        }
      } catch(e) {}
    }
  }

  function getFormData() {
    const ids = ['sender_name','sender_phone','sender_email','sender_address',
      'receiver_name','receiver_phone','receiver_email','receiver_address',
      'receiver_country','package_description','weight','service_type','estimated_delivery'];
    const obj = {};
    ids.forEach(id => { obj[id] = document.getElementById(id)?.value || ''; });
    return obj;
  }

  async function submitShipment() {
    const btn  = document.getElementById('submit-btn');
    const body = getFormData();

    if (!body.sender_name || !body.receiver_name || !body.receiver_address || !body.receiver_country) {
      showAlert('form-alert', 'Please fill in all required fields (marked with *).', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      if (isEdit) {
        await api.put('/admin/shipments/' + editId, body);
        showAlert('form-alert', 'Shipment updated successfully!', 'success');
        setTimeout(() => location.href = 'shipment-detail.html?id=' + editId, 1500);
      } else {
        // Include request_id so backend marks it converted + notifies user
        if (fromRequestId) body.request_id = fromRequestId;
        const data = await api.post('/admin/shipments', body);
        showAlert('form-alert', data.message, 'success');
        btn.textContent = '✅ Created!';
        btn.style.background = 'var(--success)';
        setTimeout(() => location.href = 'shipments.html', 2000);
      }
    } catch(e) {
      showAlert('form-alert', e.message || 'Something went wrong.', 'error');
      btn.disabled = false;
      btn.textContent = isEdit ? '💾 Update Shipment' : '🚀 Create Shipment & Generate Tracking ID';
    }
  }

  document.addEventListener('DOMContentLoaded', loadForEdit);
</script>
</body>
</html>
